<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alternatif Modern Kart Tasarımı</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cards-container">
        <div class="card">
            <div class="card-image-box">
                <img src="./css-logo.png" alt="CSS kurs gorseli" class="card-image">
            </div>

            <div class="card-content">
                <span class="card-category">WEB GELİŞTİRME</span>
                <h2 class="card-title">CSS ile Modern Arayüzler</h2>
                <p class="card-description">
                
                </p>
            </div>

            <div class="card-footer">
                <p class="card-price">₺279 <span>/ ay</span></p>
                <a href="#" class="card-button">Incele</a>
            </div>
        </div>

        <div class="card">
            <div class="card-image-box">
                <img src="./js-logo.jpg" alt="JavaScript kurs gorseli" class="card-image">
            </div>

            <div class="card-content">
                <span class="card-category">FRONTEND</span>
                <h2 class="card-title">JavaScript ile Etkileşimli Sayfalar</h2>
                <p class="card-description">
                </p>
            </div>

            <div class="card-footer">
                <p class="card-price">₺349 <span>/ ay</span></p>
                <a href="#" class="card-button">Incele</a>
            </div>
        </div>

        <div class="card">
            <div class="card-image-box">
                <img src="./ux-logo.jpg" alt="UI UX kurs gorseli" class="card-image">
            </div>

            <div class="card-content">
                <span class="card-category">UI / UX</span>
                <h2 class="card-title">Kullanıcı Odaklı Tasarım</h2>
                <p class="card-description">
                </p>
            </div>

            <div class="card-footer">
                <p class="card-price">₺229 <span>/ ay</span></p>
                <a href="#" class="card-button">Incele</a>
            </div>
        </div>
    </div>
</body>
</html>
